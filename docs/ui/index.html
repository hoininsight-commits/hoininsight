<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOIN Operator UI - Daily Content Decision</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- SECTION 0: 오늘 뭐 하면 되나요? -->
        <header id="status-bar" class="section">
            <div class="date-display" id="current-date">YYYY-MM-DD</div>
            <div class="main-status">
                <span class="label">오늘의 콘텐츠 상태</span>
                <div id="global-status-badge" class="badge">LOADING...</div>
            </div>
        </header>

        <main id="operator-view">
            <!-- SECTION 1: 오늘의 핵심 이슈 -->
            <section id="core-issue" class="section card-large">
                <h2 class="section-title">🔥 오늘의 핵심 이슈</h2>
                <div id="issue-content">
                    <h3 id="issue-hook" class="hook-text">데이터를 불러오는 중...</h3>
                    <p id="issue-why-now" class="why-now-text"></p>
                </div>
            </section>

            <div class="dual-column">
                <!-- SECTION 2: 지금 말해도 되나요? -->
                <section id="speakability" class="section card">
                    <h2 class="section-title">🗣 지금 말해도 되나요?</h2>
                    <div id="speakability-badge" class="badge">CHECKING</div>
                    <div id="operator-guide" class="guide-box"></div>
                </section>

                <!-- SECTION 3: 왜 지금 이 얘기가 나왔나요? -->
                <section id="logic-chain" class="section card">
                    <h2 class="section-title">🧠 왜 지금 이 얘기가 나왔나요?</h2>
                    <div id="logic-steps" class="logic-flow"></div>
                </section>
            </div>

            <!-- SECTION 4: 왜 이 종목들이 나왔나요? -->
            <section id="mentionables" class="section">
                <h2 class="section-title">🎯 왜 이 종목들이 나왔나요?</h2>
                <div id="mention-cards" class="card-grid"></div>
            </section>

            <!-- SECTION 5B: [STEP-20] 우선순위 종목 바스켓 -->
            <section id="portfolio-basket" class="section">
                <h2 class="section-title">📊 우선순위 종목 바스켓 (Portfolio Priority)</h2>
                <div id="portfolio-theme-banner" class="portfolio-theme-banner"></div>
                <div class="basket-tabs">
                    <span class="basket-tab tab-core active" onclick="switchBasketTab('core')">CORE</span>
                    <span class="basket-tab tab-tactical" onclick="switchBasketTab('tactical')">TACTICAL</span>
                    <span class="basket-tab tab-watchlist" onclick="switchBasketTab('watchlist')">WATCHLIST</span>
                </div>
                <div id="portfolio-core" class="portfolio-grid active-basket"></div>
                <div id="portfolio-tactical" class="portfolio-grid hidden-basket"></div>
                <div id="portfolio-watchlist" class="portfolio-grid hidden-basket"></div>
            </section>

            <!-- SECTION 5: 오늘 찍을 콘텐츠 -->
            <section id="content-packs" class="section">
                <h2 class="section-title">📦 오늘 찍을 콘텐츠</h2>
                <div id="pack-container" class="pack-items"></div>
            </section>

            <!-- SECTION 6: 이거 믿어도 되나요? -->
            <section id="evidence" class="section">
                <h2 class="section-title">🔍 이거 믿어도 되나요?</h2>
                <div id="evidence-list" class="evidence-grid"></div>
            </section>

            <!-- SECTION 7: 오늘 할 일 체크리스트 -->
            <footer id="checklist" class="section card-highlight">
                <h2 class="section-title">✅ 오늘 할 일 체크리스트</h2>
                <ul id="checklist-items"></ul>
            </footer>
        </main>

        <!-- [REF-011] Legacy Read-Only Container -->
        <div id="legacy-view" style="display: none;">
            <!-- Legacy content will be injected or remained here if partially moved -->
            <div id="legacy-content-placeholder" style="padding: 100px 20px; text-align: center; color: #64748b;">
                <h3>레거시 뷰 준비 중...</h3>
                <p>전통적인 대시보드 화면이 이곳에 렌더링됩니다.</p>
            </div>
        </div>
    </div>
    <script src="manifest_loader.js"></script>
    <script src="operator_video.js"></script>
    <script src="sidebar_registry_loader.js"></script>
    <script src="portfolio_board.js"></script>

    <!-- [HOIN-INIT] Direct today.json loader for static sections -->
    <script>
    (function () {
        const BASE = '/hoininsight/data/decision/today.json';
        const FALLBACK = 'data/decision/today.json';
        const MENTIONABLES_BASE = '/hoininsight/data/decision/mentionables.json';
        const MENTIONABLES_FALLBACK = 'data/decision/mentionables.json';

        function safe(v, d = '') { return (v === null || v === undefined || v === 'undefined') ? d : v; }

        function setBadge(el, label, cls) {
            if (!el) return;
            el.textContent = label;
            el.className = 'badge ' + (cls || '');
        }

        function renderMentionCards(stocks) {
            const el = document.getElementById('mention-cards');
            if (!el || !stocks || !stocks.length) return;
            el.innerHTML = stocks.map(s => `
                <div class="mention-card">
                    <div style="font-weight:700;font-size:0.98rem;">${safe(s.name, s.ticker || '—')}</div>
                    <div style="font-size:0.78rem;color:var(--text-secondary);margin:3px 0 6px 0;">${safe(s.ticker)} &middot; ${safe(s.sector || s.theme)}</div>
                    <div style="font-size:0.82rem;">${safe(s.reason || s.why || s.impact || '')}</div>
                </div>
            `).join('');
        }

        function renderLogicChain(data) {
            const el = document.getElementById('logic-steps');
            if (!el) return;
            const steps = data.logic_steps || data.logic_chain || [];
            if (!steps.length) { el.innerHTML = '<p style="color:var(--text-secondary);font-size:0.88rem;">—</p>'; return; }
            el.innerHTML = steps.map((s, i) => `
                <div class="logic-item">
                    <span style="color:var(--accent-blue);font-size:0.75rem;font-weight:700;">STEP ${i+1}</span>
                    <div style="font-size:0.9rem;margin-top:2px;">${typeof s === 'string' ? s : safe(s.label || s.step || s.text)}</div>
                </div>
            `).join('');
        }

        function renderContentPacks(data) {
            const el = document.getElementById('pack-container');
            if (!el) return;
            const packs = data.content_packs || data.content_pack || data.packs || [];
            if (!packs.length) { el.innerHTML = '<p style="color:var(--text-secondary);font-size:0.88rem;">콘텐츠 패키지 없음</p>'; return; }
            el.innerHTML = packs.map(p => `
                <div class="pack-card">
                    <div>
                        <div style="font-weight:700;font-size:0.95rem;">${safe(p.title || p.hook)}</div>
                        <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:3px;">${safe(p.format || p.type || p.content_type, '')}</div>
                    </div>
                    <div class="badge ${p.status === 'OK' ? 'ready' : 'hold'}">${safe(p.status, 'PENDING')}</div>
                </div>
            `).join('');
        }

        function renderChecklist(data) {
            const el = document.getElementById('checklist-items');
            if (!el) return;
            const items = data.checklist || data.action_items || data.operator_checklist || [];
            if (!items.length) { el.innerHTML = '<li style="color:var(--text-secondary);">—</li>'; return; }
            el.innerHTML = items.map(item => `
                <li style="margin-bottom:6px;font-size:0.9rem;">${typeof item === 'string' ? item : safe(item.text || item.action || item.item)}</li>
            `).join('');
        }

        async function fetchJson(url) {
            try {
                const r = await fetch(url + '?v=' + Date.now());
                if (r.ok) return await r.json();
            } catch(e) {}
            return null;
        }

        async function init() {
            // Set date
            const today = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\./g, '-').replace(/ /g, '');
            const dateEl = document.getElementById('current-date');
            if (dateEl) dateEl.textContent = new Date().toLocaleDateString('sv-SE');

            const data = await fetchJson(BASE) || await fetchJson(FALLBACK);
            if (!data) {
                setBadge(document.getElementById('global-status-badge'), '데이터 없음', 'hold');
                const hookEl = document.getElementById('issue-hook');
                if (hookEl) hookEl.textContent = '오늘의 데이터를 찾을 수 없습니다.';
                return;
            }

            // Status badge
            const sp = safe(data.speakability || data.status, 'HOLD');
            setBadge(document.getElementById('global-status-badge'), sp, sp === 'OK' ? 'ready' : sp === 'HOLD' ? 'hold' : 'hypothesis');

            // Core issue
            const hookEl = document.getElementById('issue-hook');
            if (hookEl) hookEl.textContent = safe(data.hook || data.title || data.issue_title, '오늘의 핵심 이슈');
            const whyEl = document.getElementById('issue-why-now');
            if (whyEl) whyEl.textContent = safe(data.why_now || data.why_now_summary || data.summary, '');

            // Speakability
            const spBadge = document.getElementById('speakability-badge');
            if (spBadge) setBadge(spBadge, sp, sp === 'OK' ? 'ready' : 'hold');
            const guideEl = document.getElementById('operator-guide');
            if (guideEl) guideEl.textContent = safe(data.operator_guide || data.guide || data.action_note, '');

            // Logic chain & content
            renderLogicChain(data);
            renderContentPacks(data);
            renderChecklist(data);

            // Evidence
            const evEl = document.getElementById('evidence-list');
            if (evEl) {
                const ev = data.evidence || data.evidence_list || [];
                if (ev.length) {
                    evEl.innerHTML = ev.map(e => `
                        <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:8px;padding:10px 14px;">
                            <div style="font-weight:700;font-size:0.85rem;">${safe(e.source || e.label || e)}</div>
                            <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:2px;">${safe(e.note || e.detail || '')}</div>
                        </div>
                    `).join('');
                }
            }
        }

        // Also load mentionables
        async function loadMentionables() {
            const data = await fetchJson(MENTIONABLES_BASE) || await fetchJson(MENTIONABLES_FALLBACK);
            if (!data) return;
            const stocks = Array.isArray(data) ? data : (data.stocks || data.mentionables || []);
            renderMentionCards(stocks);
        }

        document.addEventListener('DOMContentLoaded', function () {
            init();
            loadMentionables();
        });
    })();
    </script>

</html>
