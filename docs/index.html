<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOIN Insight | 운영 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="ui/styles.css?v=2.6">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            background-color: #0d1117;
            font-family: 'Pretendard', sans-serif;
            color: #c9d1d9;
            overflow: hidden; /* Sidebar has its own scroll */
        }

        .sidebar {
            width: 260px;
            background-color: #090c10;
            border-right: 1px solid #30363d;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .main-container {
            margin-left: 260px;
            height: 100vh;
            overflow-y: auto;
            background-color: #0d1117;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #8b949e;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            border-radius: 8px;
            margin: 2px 12px;
        }

        .nav-link:hover {
            background-color: #161b22;
            color: #c9d1d9;
        }

        .nav-link.active {
            background-color: #1f6feb;
            color: #ffffff;
        }

        .nav-link span.icon {
            font-size: 18px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 0; display: none; }
            .main-container { margin-left: 0; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="p-6">
            <h1 class="text-xl font-black text-white tracking-tighter">HOIN INSIGHT</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Operator Dashboard</p>
        </div>

        <nav class="flex-1 mt-4 overflow-y-auto max-h-[calc(100vh-160px)] custom-scrollbar">
            <!-- 1. Operator Core Menus -->
            <div class="px-6 mb-2 mt-4">
                <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Main Intelligence</p>
            </div>
            <a href="#market-radar" class="nav-link" id="nav-market-radar">
                <span class="icon">📡</span>
                <span>Market Radar</span>
            </a>
            <a href="#narrative-brief" class="nav-link" id="nav-narrative-brief">
                <span class="icon">📜</span>
                <span>Narrative Brief</span>
            </a>
            <a href="#impact-map" class="nav-link" id="nav-impact-map">
                <span class="icon">🗺️</span>
                <span>Impact Map</span>
            </a>
            <a href="#content-studio" class="nav-link" id="nav-content-studio">
                <span class="icon">🎬</span>
                <span>Content Studio</span>
            </a>

            <!-- 2. Developer Mode -->
            <div class="px-6 mb-2 mt-10 border-t border-slate-800/50 pt-6">
                <p class="text-[10px] font-black text-slate-600 uppercase tracking-widest">-------- Developer --------</p>
            </div>
            <a href="#system" class="nav-link opacity-60 hover:opacity-100" id="nav-system">
                <span class="icon">⚙️</span>
                <span>System</span>
            </a>
            <a href="#memory" class="nav-link opacity-60 hover:opacity-100" id="nav-memory">
                <span class="icon">🧠</span>
                <span>Memory</span>
            </a>
            <a href="#ontology" class="nav-link opacity-60 hover:opacity-100" id="nav-ontology">
                <span class="icon">🕸️</span>
                <span>Ontology</span>
            </a>
            <a href="#cycles" class="nav-link opacity-60 hover:opacity-100" id="nav-cycles">
                <span class="icon">🎡</span>
                <span>Cycles</span>
            </a>
            <a href="#history" class="nav-link opacity-60 hover:opacity-100" id="nav-history">
                <span class="icon">📜</span>
                <span>History</span>
            </a>
            
            <!-- Hidden Legacy Items (for router compatibility) -->
            <div class="hidden">
                <a href="#today" id="nav-today"></a>
                <a href="#evolution" id="nav-evolution"></a>
                <a href="#theme-momentum" id="nav-theme-momentum"></a>
                <a href="#theme-evolution" id="nav-theme-evolution"></a>
                <a href="#early-theme" id="nav-early-theme"></a>
                <a href="#theme-narrative" id="nav-theme-narrative"></a>
                <a href="#top-topic" id="nav-top-topic"></a>
                <a href="#video-script" id="nav-video-script"></a>
                <a href="#mentionables" id="nav-mentionables"></a>
                <a href="#market-story" id="nav-market-story"></a>
            </div>
        </nav>

        <div class="p-6 border-t border-slate-800/50">
            <div id="build-info" class="text-[9px] font-mono text-slate-600 space-y-1">
                <div>v2.8-STABLE</div>
                <div id="build-ts">Loading...</div>
            </div>
        </div>
    </aside>

    <main class="main-container">
        <div id="app" class="p-6 md:p-10 max-w-7xl mx-auto">
            <!-- Content will be injected here by router.js -->
            <div class="flex flex-col items-center justify-center h-[80vh]">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-slate-500 font-bold animate-pulse">Initializing Interface...</p>
            </div>
        </div>
    </main>

    <!-- Build Meta Loader -->
    <script>
        fetch('data/build_meta.json')
            .then(r => r.ok ? r.json() : null)
            .then(data => {
                if(data) document.getElementById('build-ts').innerText = data.date_kst || data.timestamp;
            });
    </script>

    <!-- Router Entry -->
    <script type="module">
        import { initRouter } from './ui/router.js?v=2.7';
        document.addEventListener('DOMContentLoaded', initRouter);
    </script>
</body>
</html>
